<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipMaster 4K - Premium YouTube Clipper</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">🎬</div>
        <h1>ClipMaster 4K</h1>
      </div>
      <p class="subtitle">Extract perfect clips in highest quality</p>
    </header>

    <main class="main">
      <!-- URL Input Section -->
      <div class="input-section glass-panel">
        <div class="input-group">
          <input 
            type="url" 
            id="videoUrl" 
            placeholder="https://www.youtube.com/watch?v=..."
            class="url-input"
          >
          <button id="fetchBtn" class="fetch-btn">
            <span class="btn-text">Fetch Video</span>
            <div class="spinner hidden"></div>
          </button>
        </div>
      </div>

      <!-- Video Preview Section -->
      <div id="videoSection" class="video-section hidden glass-panel">
        <div class="video-header">
          <img id="thumbnail" class="thumbnail" alt="Video thumbnail">
          <div class="video-info">
            <h2 id="videoTitle"></h2>
            <div class="video-meta">
              <span id="videoDuration"></span>
            </div>
          </div>
        </div>
        <iframe 
          id="videoPlayer" 
          class="video-player"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>

      <!-- Trim Controls -->
      <div id="trimSection" class="trim-section hidden glass-panel">
        <div class="trim-header">
          <h3>Trim Your Clip</h3>
          <div class="duration-display" id="clipDuration">00:00 - 00:00 (00:00)</div>
        </div>
        
        <div class="timeline-container">
          <div class="time-inputs">
            <div class="time-input-group">
              <label>Start</label>
              <input type="number" id="startTime" min="0" value="0" class="time-input">
              <span class="time-label" id="startTimeDisplay">00:00</span>
            </div>
            <div class="time-input-group">
              <label>End</label>
              <input type="number" id="endTime" min="0" value="0" class="time-input">
              <span class="time-label" id="endTimeDisplay">00:00</span>
            </div>
          </div>
          
          <div class="dual-range-slider">
            <input type="range" id="startSlider" class="range-slider start-slider" min="0" max="100" value="0">
            <input type="range" id="endSlider" class="range-slider end-slider" min="0" max="100" value="100">
            <div class="slider-track"></div>
            <div class="slider-fill"></div>
            <div class="slider-thumb start-thumb"></div>
            <div class="slider-thumb end-thumb"></div>
          </div>
        </div>
      </div>

      <!-- Download Panel -->
      <div id="downloadSection" class="download-section hidden glass-panel">
        <h3>Download Settings</h3>
        <div class="settings-grid">
          <div class="setting-group">
            <label>Quality</label>
            <select id="qualitySelect" class="select-input">
              <option value="best">Best Available (4K/1080p)</option>
              <option value="best[height<=1080]">1080p</option>
              <option value="best[height<=720]">720p</option>
              <option value="best[height<=480]">480p</option>
            </select>
          </div>
          <div class="setting-group">
            <label>Format</label>
            <select id="formatSelect" class="select-input">
              <option value="mp4">MP4 (Video)</option>
              <option value="mp3">MP3 (Audio Only)</option>
            </select>
          </div>
        </div>
        
        <div class="progress-container hidden">
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <span class="progress-text">Processing...</span>
        </div>

        <button id="downloadBtn" class="download-btn">
          <span class="btn-text">Download Clip</span>
          <div class="spinner hidden"></div>
        </button>

        <div id="downloadResult" class="download-result hidden"></div>
      </div>
    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
